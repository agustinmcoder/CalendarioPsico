<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Psico Agenda — Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">🌿</div>
      <h1>Psico Agenda</h1>
      <p>Ingresá tus datos para acceder</p>

      <form id="login-form" autocomplete="off">
        <div class="form-group" style="text-align:left;">
          <label class="form-label" for="email-input">Email</label>
          <input type="email" id="email-input" class="form-control" placeholder="tu@email.com" autofocus />
        </div>
        <div class="form-group" style="text-align:left;">
          <label class="form-label" for="password-input">Contraseña</label>
          <input type="password" id="password-input" class="form-control" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn-primary login-btn" id="login-btn">Ingresar</button>
        <p class="login-error" id="login-error">Email o contraseña incorrectos.</p>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    (async () => {
      const { data: { session } } = await db.auth.getSession();
      if (session) window.location.href = 'calendar.html';
    })();

    const form = document.getElementById('login-form');
    const btn  = document.getElementById('login-btn');
    const errorEl = document.getElementById('login-error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email-input').value.trim();
      const password = document.getElementById('password-input').value;
      if (!email || !password) return;

      btn.disabled = true;
      btn.textContent = 'Verificando...';
      errorEl.style.display = 'none';

      const { error } = await db.auth.signInWithPassword({ email, password });

      if (error) {
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      } else {
        window.location.href = 'calendar.html';
      }
    });
  </script>
</body>
</html>
